name: Build Nate's Production Pro APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Create Android platform files
        run: flutter create . --platforms android

      - name: Force compileSdk 36
        run: |
          python3 - <<'PY'
          from pathlib import Path

          files = [
              Path("android/app/build.gradle.kts"),
              Path("android/app/build.gradle"),
          ]

          for p in files:
              if p.exists():
                  text = p.read_text()
                  text = text.replace("compileSdk = flutter.compileSdkVersion", "compileSdk = 36")
                  text = text.replace("compileSdk = 33", "compileSdk = 36")
                  text = text.replace("compileSdkVersion flutter.compileSdkVersion", "compileSdkVersion 36")
                  text = text.replace("compileSdkVersion 33", "compileSdkVersion 36")
                  p.write_text(text)
                  print("UPDATED:", p)
                  print(p.read_text())
          PY

      - name: Get dependencies
        run: flutter pub get

      - name: Generate Android icon
        run: dart run flutter_launcher_icons

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Nates-Production-Pro-v1-APK
          path: build/app/outputs/flutter-apk/app-release.apk
